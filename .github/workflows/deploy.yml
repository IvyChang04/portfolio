name: Deploy nested Vite App to GitHub Pages

on:
  push:
    branches: ['master'] # Change to 'master' if your default branch is named master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    # MAGIC LINE 1: Tell GitHub to run all commands inside your nested Vite folder
    defaults:
      run:
        working-directory: ./portfolio 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          # Tell the cache exactly where to find your package-lock.json
          cache-dependency-path: ./portfolio/package-lock.json 

      - name: Install dependencies
        run: npm ci

      - name: Build the project
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # MAGIC LINE 2: Point to the dist folder inside your nested directory
          path: './portfolio/dist' 

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4